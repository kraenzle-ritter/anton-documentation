site_name: Anton – Dokumentation
repo_url: https://github.com/kraenzle-ritter/anton-documentation
repo_name: 'anton-documentation'
site_author: 'Andreas Kraenzle, Gerold Ritter'
theme:
  name: material
  language: de
  logo: images/kr_logo.png
  favicon: images/favicon-anton.png
  font:
    text: Roboto
    code: Open Mono
  features:
    - search.suggest
    - search.highlight
    - search.share
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.inlinehilite
  - pymdownx.inlinehilite
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
      baselevel: 1
  - pymdownx.superfences:
        # make exceptions to highlighting of code:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
nav:
  - Home: index.md
  - User:
    - Einstieg: user/index.md
    - Erschliessen:
      - Verzeichnungseinheiten: user/objects.md
      - Tektonik und Verschieben: user/hierarchy.md
      - Formulare und Felder: user/forms.md
      - Signaturen: user/identifiers.md
      - Ereignisse: user/antonevents.md
      - Textfelder und Markdown: user/markdown.md
    - Normdaten:
      - Akteure: user/actors.md
      - Orte: user/places.md
      - Schlagwörter: user/keywords.md
      - Standorte: user/locations.md
      - Normdatenabgleich: user/authorities.md
    - Medien:
      - Medien: user/media.md
      - Mediengalerie: user/gallery.md
      - Dokumente: user/documents.md
      - QR-Code Upload: user/qr-upload.md
      - Filminhalt erschliessen: user/movie-tracks.md
    - Zugang und Schutzfristen: user/access.md
    - Recherche:
      - Volltextsuche: user/search.md
      - Schnelle Suche: user/search-v2.md
      - Gewichtete Suche: user/weighted-search.md
      - Korrespondenzen: user/correspondences.md
      - Warenkorb: user/cart.md
    - Import und Export:
      - Datenimport: user/import.md
      - SIP Ingest: user/sip.md
      - DIP herunterladen: user/download-dip.md
    - Verwaltung:
      - Ausleihe von Objekten: user/loans.md
      - Auswahl und Sammelaktionen: user/selection.md
      - Statistiken: user/statistics.md
      - KI-Erschliessung: user/ai-cataloging.md
      - Sprachkonfiguration: user/languages.md
    - Anmeldung:
      - Zwei-Faktor-Authentifizierung: user/2FA.md
      - Passkey Authentifizierung: user/passkey.md
  - Developer:
    - Architektur-Überblick: developer/index.md
    - Domänenmodell: developer/domain-model.md
    - Das Formularsystem: developer/forms.md
    - Nebenläufigkeit: developer/events-jobs.md
    - Erweiterungspunkte: developer/extension-points.md
  - Admin:
    - Einrichtung:
      - Serveranforderungen: admin/requirements.md
      - Installation: admin/installation.md
      - Einstellungen: admin/configuration.md
      - Logo und Favicons: admin/logo.md
      - Anmeldung: admin/authentication.md
    - Archiv konfigurieren:
      - Formulare und Formularsätze: admin/forms.md
      - Wertelisten: admin/valuelists.md
      - Schutzfristen: admin/protection-periods.md
      - Suchfelder: admin/searchfields.md
      - Startseite und Navigation: admin/home.md
      - Archivbeschreibung (ISDIAH): admin/isdiah.md
    - Benutzerverwaltung: admin/users.md
    - Medien:
      - Mediengalerie: admin/gallery.md
      - Dokumente: admin/documents.md
      - Wasserzeichen: admin/watermarks.md
      - Medienliste und Sammelaktionen: admin/bulk-media-list.md
    - Suche:
      - Schnelle Suche (Typesense): admin/typesense.md
      - Gewichtete Suche: admin/weighted-search.md
    - Import:
      - SIP Ingest (eCH-0160): admin/sip-ingest.md
      - agate SIP-Import: admin/agate-sip.md
      - Normdaten-Abgleich: admin/authorities.md
    - Export und Publikation:
      - DIP herunterladen: admin/download-dip.md
      - Word-Findbuch: admin/download-word.md
      - OCFL herunterladen: admin/download-ocfl.md
      - RDF-Export (CIDOC CRM / Memobase): admin/download-rdf.md
      - Statische Publikation und Round-Trip: admin/statische-publikation.md
      - Mastodon: admin/mastodon.md
    - Langzeitarchivierung:
      - Überblick: admin/preservation.md
      - Export-Matrix: admin/export-matrix.md
      - Preservation Planning: admin/preservation-planning.md
      - Inge und DIMAG: admin/inge.md
      - DIMAG-Upload-Status: admin/dimag-uploads.md
    - Betrieb:
      - Anton Doctor: admin/doctor.md
      - Sicherung und Wiederherstellung: admin/restore.md
      - Console Commands: admin/console-commands.md
      - Nachrichten: admin/notifications.md
      - Feedback an die Entwicklung: admin/feedback.md
      - Verkleinern für öffentliche Installation: admin/shrink.md
    - KI-Erschliessung: admin/ai-cataloging.md
  - API: 
    - Authentication: api/authentication.md
    - Endpoints: api/index.md
  - FAQ:
    - Anton as Service: faq/anton_as_service.md
    - Anton on Premises: faq/anton_on_premises.md
    - Allgemeine FAQs: faq/index.md
    - Open Source: faq/open_source.md
    - Langzeitarchivierung: faq/longterm_archives.md
    - Erschliessung: faq/erschliessung.md
    - Migration/Import: faq/import.md
    - Recherche und Benutzung: faq/recherche.md
    - Export: faq/export.md
    - Installationen: faq/installationen.md
extra:
  social:
    - icon: fontawesome/brands/mastodon
      link: https://social.anoxinon.de/@anton
    - icon: fontawesome/brands/github
      link: https://github.com/kraenzle-ritter
plugins:
  - mermaid2
  - render_swagger
  - search:
      lang:
        - de 
        - en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
