        - places
      summary: Events (antonevents) linked to a place
      description: Default JSON; `format=kml` returns a KML document with placemarks (address, coordinates, timestamp).
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
        - in: query
          name: format
          schema:
            type: string
            enum: [json, kml]
      responses:
        200:
          description: OK

# -------------
# media
# -------------
  /media/{id}:
    get:
      tags:
        - media
      summary: Stream a media file by its ID
      description: Returns the binary media file with the appropriate Content-Type (cloud/Inge fallback when the local file is missing).
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        200:
          description: OK — binary media file
        404:
          description: Media not found

# -------------
# system / counts / auth
# -------------
  /auth_user:
    get:
      tags:
        - users
      summary: The authenticated user (resolved from the API token)
      security:
        - ApiKeyAuth: []
      responses:
        200:
          description: OK
  /timeline:
    get:
      tags:
        - system
      summary: Object counts grouped by creation date
      description: Returns a map of creation date → object count, optionally restricted to one object type.
      parameters:
        - in: query
          name: object_type
          description: Object-type label (e.g. "Brief") to restrict the timeline.
          schema:
            type: string
      responses:
        200:
          description: OK
  /counts:
    get:
      tags:
