openapi: 3.0.1
info:
  title: Anton API
  description: >
    API documentation of Anton. Read endpoints for authority data
    (actors, places, keywords) and the valuelists are public; endpoints
    marked with a lock require an API token. The token is passed as the
    `api_token` query parameter (`ApiKeyAuth`); the AI-cataloging
    endpoints use a Bearer token (`BearerAuth`). Do not use this in
    production yet.
  # contact:
  # email: info@anton.ch
  version: 0.0.1
servers:
  - url: http://kr.anton.test/api
    description: lokaler Testserver
  - url: https://archives.georgfischer.com/api
    description: Georg Fischer Archiv
  - url: https://besenval.anton.ch/api
    description: Musée des Suisses dans le Monde, Archives
  - url: https://gosteli.anton.ch/api
    description: Archiv zur Geschichte der schweizerischen Frauenbewegung
  - url: https://kr.anton.ch/api
    description: Kränzle & Ritter Firmenarchiv (Testarchiv)
  - url: https://sik-isea.anton.ch/api
    description: Schweizerisches Kunstarchiv

tags:
  - name: actors
    description: Everybody who can act (person, organisation etc.)
  - name: keywords
    description: Keywords
  - name: locations
    description: Locations (archival storages)
  - name: objects
    description: Archival units of description (eg. records)
  - name: places
    description: Places
  - name: users
    description: Users
  - name: media
    description: Media files (streamed binary)
  - name: valuelists
    description: Valuelists used in Anton
  - name: sip
    description: SIP ingest (eCH-0160) — machine-to-machine
  - name: ai-cataloging
    description: AI-cataloging control plane (consumed by external producers, e.g. agate)
  - name: system
    description: System / counts / authenticated user

paths:

# -------------
# actors
# -------------
  /actors:
    get:
      tags:
        - actors
      summary: Get a list of actors
      parameters:
        - $ref: '#/components/parameters/searchParam'
        - name: authority_type
          in: query
          schema:
            type: string
            enum: [person,family,corporate_body,organisational_unit,group,software]
          description:
            Should be a value from the valuelist authority-types (see below). You can also use the label.
        - $ref: '#/components/parameters/providerParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sortFieldParam'
        - $ref: '#/components/parameters/sortAscParam'
        - in: query
          name: format
          schema:
            type: string
            enum: [json,beacon,select2]
          description:
               default is `json`
      responses:
        200:
          description: OK
    post:
      tags:
        - actors
      summary: Create an actor
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorInput'
      responses:
        200:
          description: Created — returns the actor as an API resource
        422:
          description: Validation error
  /actors/{id}:
    get:
      tags:
       - actors
      summary: Get an existing actor by its ID
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        200:
          description: OK
        404:
          description: Actor not found
    put:
      tags:
        - actors
      summary: Update an existing actor
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorInput'
      responses:
        200:
          description: OK — returns the updated actor
        404:
          description: Actor not found
        422:
          description: Validation error

