# -------------
# objects
# -------------
  /objects:
    get:
      tags:
        - objects
      summary: Get a list of AntonObjects (with field filters)
      description: >
        Returns a paginated list of AntonObjects. Beyond the simple `search`
        (full-text over all indexed fields), the list supports **structured
        field filters** passed as three parallel arrays — `fields[]`,
        `operators[]`, `values[]` — where the i-th filter is
        `fields[i] operators[i] values[i]`. Multiple filters are AND-combined.


        Operators: `=`, `<>` (not equal), `contains` (full-text / LIKE),
        `not_in`; date and numeric fields additionally accept the comparison
        operators `>`, `<`, `>=`, `<=`.


        Common fields: `fulltext`, `object.identifier`, `object.title`,
        `level_of_description`, `fonds`, `keywords`, `actors`, `places`,
        `languages`, `city`, `state`, `country`, `creation_min`,
        `creation_max`, `created_at`, `updated_at`, `private`, `digitized`,
        `release_year`, `media.*`, `note.<field>`, `event*`. The available
        descriptor (`note.*`) fields are tenant-specific (driven by the
        ObjectForms).


        Example —
        `/objects?fields[]=object.title&operators[]=contains&values[]=Brief&fields[]=creation_min&operators[]=>=&values[]=1900`
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/searchParam'
        - in: query
          name: fields
          description: Filter field names — parallel to `operators[]` and `values[]`.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - in: query
          name: operators
          description: One comparison operator per filter (`=`, `<>`, `contains`, `not_in`, `>`, `<`, `>=`, `<=`).
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - in: query
          name: values
          description: One value per filter.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - in: query
          name: identifier
          description: Shortcut — match the object with this exact identifier.
          schema:
            type: string
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sortFieldParam'
        - $ref: '#/components/parameters/sortAscParam'
        - in: query
          name: format
          schema:
            type: string
            enum: [json,select2,flat]
          description:
               default is `json` (`flat` is a denormalised shape for Excel export)
      responses:
        200:
          description: OK
  /objects/{id}:
    get:
      tags:
       - objects
      summary: Get an AntonObject by its ID — JSON, TEI XML or RDF (three profiles, four serialisations)
      security:
        - ApiKeyAuth: []
      description: >
        Default returns the AntonObject as JSON (Eloquent API Resource).
        With `format=tei` the response is a TEI Header XML.
        With `format=cidoc-crm` (alias `rdf`/`cidoc`) the response is an RDF
        export of the object subtree in the A+ profile (CIDOC CRM 7.1.x lead +
        RiC-O 1.1 selective). With `format=ric` (alias `rico`) the response is
        pure RiC-O 1.1. With `format=memobase` the response is the Memobase
        JSON-LD profile (RiC-O with Memobase-specific @context for memobase.ch
        ingest). For all three RDF profiles the `serialization` parameter
        chooses the wire format: A+ and RiC-O accept all four
        (`turtle`/`jsonld`/`rdfxml`/`ntriples`); Memobase accepts only
        `jsonld` (default) and `turtle` (debug). See the
        [RDF-Export-Dokumentation](../admin/download-rdf.md) for details.
      parameters:
        - $ref: '#/components/parameters/idParam'
        - $ref: '#/components/parameters/searchParam'
        - $ref: '#/components/parameters/objectFormatParam'
        - $ref: '#/components/parameters/serializationParam'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Default — AntonObject as Eloquent API Resource
            application/xml:
              schema:
                type: string
                description: TEI Header XML (when `format=tei`)
            text/turtle:
              schema:
                type: string
                description: RDF/Turtle (when `format=cidoc-crm` or `format=ric` with `serialization=turtle`)
            application/ld+json:
              schema:
                type: object
                description: JSON-LD (when `format` is one of the RDF profiles with `serialization=jsonld`)
            application/rdf+xml:
              schema:
                type: string
                description: RDF/XML (when `format=cidoc-crm` or `format=ric` with `serialization=rdfxml`)
            application/n-triples:
              schema:
                type: string
                description: N-Triples (when `format=cidoc-crm` or `format=ric` with `serialization=ntriples`)
        400:
          description: Bad request — e.g. unsupported `serialization` for the requested profile
        403:
          description: Forbidden — the object is not publicly accessible (`private=1`)
        404:
          description: AntonObject not found
  /objects/show:
    get:
      tags:
       - objects
      summary: Get the first AntonObject by the search parameters, usually used with an identifier
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/searchParam'
      responses:
        200:
          description: OK
        404:
          description: AntonObject not found
