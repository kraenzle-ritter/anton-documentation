openapi: 3.0.1
info:
  title: Anton API
  description: 'API Documentation of Anton. Do not use this in production yet.'
  # contact:
  # email: info@anton.ch
  version: 0.0.1
servers:
  - url: http://kr.anton.test/api
    description: lokaler Testserver
  - url: https://archives.georgfischer.com/api
    description: Georg Fischer Archiv
  - url: https://besenval.anton.ch/api
    description: Musée des Suisses dans le Monde, Archives
  - url: https://gosteli.anton.ch/api
    description: Archiv zur Geschichte der schweizerischen Frauenbewegung
  - url: https://kr.anton.ch/api
    description: Kränzle & Ritter Firmenarchiv (Testarchiv)
  - url: https://sik-isea.anton.ch/api
    description: Schweizerisches Kunstarchiv

tags:
  - name: actors
    description: Everybody who can act (person, organisation etc.)
  - name: keywords
    description: Keywords
  - name: locations
    description: Locations (archival storages)
  - name: objects
    description: Archival units of description (eg. records)
  - name: places
    description: Places
  - name: users
    description: Users
  - name: valuelists
    description: Valuelists used in Anton

paths:

# -------------
# actors
# -------------
  /actors:
    get:
      tags:
        - actors
      summary: Get a list of actors
      parameters:
        - $ref: '#/components/parameters/searchParam'
        - name: authority_type
          in: query
          schema:
            type: string
            enum: [person,family,corporate_body,organisational_unit,group,software]
          description:
            Should be a value from the valuelist authority-types (see below). You can also use the label.
        - $ref: '#/components/parameters/providerParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sortFieldParam'
        - $ref: '#/components/parameters/sortAscParam'
        - in: query
          name: format
          schema:
            type: string
            enum: [json,beacon,select2]
          description:
               default is `json`
      responses:
        200:
          description: OK
  /actors/{id}:
    get:
      tags:
       - actors
      summary: Get an existing actor by its ID
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        200:
          description: OK
        404:
          description: Actor not found

# -------------
# keywords
# -------------
  /keywords/{locale}:
    get:
      tags:
        - keywords
      summary: Get a list of existing keywords
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/searchParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - in: query
          name: sortField
          schema:
            type: string
            enum: [id,label]
        - $ref: '#/components/parameters/sortAscParam'
        - in: query
          name: format
          schema:
            type: string
            enum: [json,select2]
          description:
               default is `json`
      responses:
        200:
          description: OK
  /keywords/{locale}/{id}:
    get:
      tags:
       - keywords
      summary: Get an existing keyword by its ID
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        200:
          description: OK
        404:
          description: Keyword not found

# -------------
# locations
# -------------
  /locations:
    get:
      tags:
        - locations
      summary: Get a list of existing locations of archival storages
      parameters:
        - $ref: '#/components/parameters/searchParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sortFieldParam'
        - $ref: '#/components/parameters/sortAscParam'
        - in: query
          name: format
          schema:
            type: string
            enum: [json,select2]
          description:
             default is `json`
      responses:
        200:
          description: OK
  /locations/{id}:
    get:
      tags:
       - locations
      summary: Get an existing location (archival storage) by its ID
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        200:
          description: OK
        404:
          description: Place not found

# -------------
# objects
# -------------
  /objects:
    get:
      tags:
        - objects
      summary: Get a list of AntonObjects
      parameters:
        - $ref: '#/components/parameters/searchParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sortFieldParam'
        - $ref: '#/components/parameters/sortAscParam'
        - in: query
          name: format
          schema:
            type: string
            enum: [json,select2]
          description:
               default is `json`
      responses:
        200:
          description: OK
  /objects/{id}:
    get:
      tags:
       - objects
      summary: Get an AntonObject by its ID — JSON, TEI XML or RDF (three profiles, four serialisations)
      description: >
        Default returns the AntonObject as JSON (Eloquent API Resource).
        With `format=tei` the response is a TEI Header XML.
        With `format=cidoc-crm` (alias `rdf`/`cidoc`) the response is an RDF
        export of the object subtree in the A+ profile (CIDOC CRM 7.1.x lead +
        RiC-O 1.1 selective). With `format=ric` (alias `rico`) the response is
        pure RiC-O 1.1. With `format=memobase` the response is the Memobase
        JSON-LD profile (RiC-O with Memobase-specific @context for memobase.ch
        ingest). For all three RDF profiles the `serialization` parameter
        chooses the wire format: A+ and RiC-O accept all four
        (`turtle`/`jsonld`/`rdfxml`/`ntriples`); Memobase accepts only
        `jsonld` (default) and `turtle` (debug). See the
        [RDF-Export-Dokumentation](../admin/download-rdf.md) for details.
      parameters:
        - $ref: '#/components/parameters/idParam'
        - $ref: '#/components/parameters/searchParam'
        - $ref: '#/components/parameters/objectFormatParam'
        - $ref: '#/components/parameters/serializationParam'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Default — AntonObject as Eloquent API Resource
            application/xml:
              schema:
                type: string
                description: TEI Header XML (when `format=tei`)
            text/turtle:
              schema:
                type: string
                description: RDF/Turtle (when `format=cidoc-crm` or `format=ric` with `serialization=turtle`)
            application/ld+json:
              schema:
                type: object
                description: JSON-LD (when `format` is one of the RDF profiles with `serialization=jsonld`)
            application/rdf+xml:
              schema:
                type: string
                description: RDF/XML (when `format=cidoc-crm` or `format=ric` with `serialization=rdfxml`)
            application/n-triples:
              schema:
                type: string
                description: N-Triples (when `format=cidoc-crm` or `format=ric` with `serialization=ntriples`)
        400:
          description: Bad request — e.g. unsupported `serialization` for the requested profile
        403:
          description: Forbidden — the object is not publicly accessible (`private=1`)
        404:
          description: AntonObject not found
  /objects/show:
    get:
      tags:
       - objects
      summary: Get the first AntonObject by the search parameters, usually used with an identifier
      parameters:
        - $ref: '#/components/parameters/searchParam'
      responses:
        200:
          description: OK
        404:
          description: AntonObject not found
# -------------
# places
# -------------
  /places:
    get:
      tags:
        - places
      summary: Get a list of places
      parameters:
        - $ref: '#/components/parameters/searchParam'
        - in: query
          name: provider
          description: Only useful if the format is beacon (default is gnd).
          schema:
            type: string
            enum: [gnd,geonames,wikipedia]
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sortFieldParam'
        - $ref: '#/components/parameters/sortAscParam'
        - in: query
          name: format
          schema:
            type: string
            enum: [json,beacon,select2]
          description:
               default is `json`
      responses:
        200:
          description: OK
  /places/{id}:
    get:
      tags:
       - places
      summary: Get an existing place by its ID
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        200:
          description: OK
        404:
          description: Place not found
# -------------
# users
# -------------
  /users:
    get:
      tags:
        - users
      security:
        - ApiKeyAuth: []
      summary: Get a list of existing users
      parameters:
        - $ref: '#/components/parameters/searchParam'
        - $ref: '#/components/parameters/perPageParam'
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/sortFieldParam'
        - $ref: '#/components/parameters/sortAscParam'
        - in: query
          name: format
          schema:
            type: string
            enum: [json,select2]
          description:
               default is `json`
      responses:
        200:
          description: OK
  /users/{id}:
    get:
      tags:
       - users
      summary: Get an existing user by its ID
      security:
       - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        200:
          description: OK
        404:
          description: User not found

# -------------
# valuelists
# -------------
  /authority-types:
    get:
      tags:
      - valuelists
      summary: Get a list of labels of authority types (eg. person, organization) which are used as ActorsType in the default languageπ.
      parameters:
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK
  /authority-types/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of labels of authority types (eg. person, organization) which are used as ActorsType in a certain language.
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK

  /countries/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of active countries which are used to describe places.
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK

  /details-of-description/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of terms which characterize the granularity of the desription (eg. minimal, full)
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK

  /event-types/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of event types (eg. creation) which are used to connect objects, actors and places.
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK

  /languages/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of active languages which are used to describe archival objects (records).
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK

  /levels-of-description/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of levels of description of archival objects (eg. records).
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK

  /object-types/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of object types.
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK

  /periods-of-protection/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of periods of protection (descriptive string values like "prolonged").
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK

  /place-types/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of Geoname Feature Classes which is used as PlaceType.
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK

  /status-of-description/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of terms which describe the status of the description (eg. draft, final)
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK

  /user-event-types/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of user event types (eg. loan) which are used to connect objects and users.
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK

  /vacat/{locale}:
    get:
      tags:
      - valuelists
      summary: Get a list of entries, if an why an object is missing (vacat).
      parameters:
        - $ref: '#/components/parameters/localeParam'
        - $ref: '#/components/parameters/formatParam'
      responses:
        200:
          description: OK
  /sips/{sip_id}:
    get:
      security:
        - ApiKeyAuth: []
      tags:
      - sip
      summary: show a sip with its file list 
      parameters:
        - $ref: '#/components/parameters/idParam'

      responses:
        200:
          description: OK
  /sips/{sip_id}/confirm:
    post:
      security:
        - ApiKeyAuth: []
      tags:
      - sip
      summary: confirm a sip ingest and finalize the entry in anton 
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        200:
          description: OK
  /sips/{sip_id}/revert:
    post:
      security:
        - ApiKeyAuth: []
      tags:
      - sip
      summary: revert a sip ingest and restore anton from the current backup
      parameters:
        - $ref: '#/components/parameters/idParam'
      responses:
        200:
          description: OK
  /ai-cataloging/profile:
    get:
      security:
        - BearerAuth: []
      tags:
      - ai-cataloging
      summary: resolve the effective AI-cataloging profile for a context
      description: >
        Control-plane endpoint (issue #219) consumed by external producers
        such as agate. Walks Anton's scope chain (global → tenant →
        objectform → subtree) and returns the flattened EffectiveProfile as
        a flat JSON object (no `data` envelope) that mirrors the
        `kraenzle-ritter/ai-cataloging` EffectiveProfile DTO 1:1, so the
        consumer can deserialise it straight back into that class.
        Tenant resolution is implicit from the hit domain + token — no tenant
        parameter. Consumers are advised to cache the response for ~5 minutes.
      parameters:
        - name: slug
          in: query
          required: false
          description: explicit profile slug override (UI picker); falls through to the scope walk if absent or unmatched
          schema:
            type: string
        - name: objectform_id
          in: query
          required: false
          schema:
            type: integer
        - name: subtree_root_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        200:
          description: Effective profile resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectiveProfile'
        401:
          description: missing or invalid token
        404:
          description: no active profile resolved for the context
  /ai-cataloging/usage:
    post:
      security:
        - BearerAuth: []
      tags:
      - ai-cataloging
      summary: log one externally-produced AI call
      description: >
        Writes a single row to `ai_usage_log`. `cost_chf` is the
        provider-billed cost (NOT margin-adjusted — Anton applies the tenant
        margin server-side to compute the billable cost). `success` maps to
        the internal status (`true` → `ok`, `false` → `provider_error`). An
        unknown `profile_slug` still logs the row with null profile FKs and
        the slug preserved for drill-down. Consumers typically call this
        asynchronously (the operator does not wait for it).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsageReport'
      responses:
        201:
          description: row created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        401:
          description: missing or invalid token
        422:
          description: validation error
  /ai-cataloging/budget/status:
    get:
      security:
        - BearerAuth: []
      tags:
      - ai-cataloging
      summary: pre-call budget verdict for a month
      description: >
        Returns month-to-date spend, the cap, and a verdict. `status` is one
        of `ok`, `soft_warn` (≥ 80 %), `hard_block` (≥ 100 %, or no budget
        configured for the month — fail-closed). Consumers should refuse the
        AI call when `status == hard_block`. Advised cache: ~30 seconds.
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
            example: 2026
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
            example: 5
      responses:
        200:
          description: budget status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetStatus'
        401:
          description: missing or invalid token
        422:
          description: invalid year or month
components:
  parameters:
    formatParam:
      name: format
      in: query
      schema:
        type: string
        enum: [select2,json]
      description:
           default is `json`
    objectFormatParam:
      name: format
      in: query
      required: false
      schema:
        type: string
        enum:
          - json
          - tei
          - cidoc-crm
          - cidoc
          - rdf
          - ric
          - rico
          - memobase
          - select2
          - flat
      description: >
        Output format for `/objects/{id}`.
        Default `json` (Eloquent API Resource).
        `tei` returns a TEI Header XML.
        `cidoc-crm` / `cidoc` / `rdf` (aliases) return the A+ RDF profile (CIDOC CRM lead + RiC-O 1.1 selective).
        `ric` / `rico` (aliases) return pure RiC-O 1.1.
        `memobase` returns the Memobase JSON-LD profile.
        `select2` / `flat` are AJAX-helper shapes used internally.
    serializationParam:
      name: serialization
      in: query
      required: false
      schema:
        type: string
        enum:
          - turtle
          - jsonld
          - rdfxml
          - ntriples
      description: >
        Wire-format for the RDF profiles. Default per profile:
        A+ (`cidoc-crm`) defaults to `turtle`; RiC-O (`ric`) and Memobase default to `jsonld`.
        Memobase accepts only `jsonld` and `turtle`; A+ and RiC-O accept all four.
        Ignored for non-RDF formats (`json`, `tei`).
    idParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
    localeParam:
      name: locale
      in: path
      required: true
      schema:
        type: string
        enum: [de, en, fr]
    pageParam:
      name: page
      in: query
      schema:
        type: integer
    perPageParam:
      name: perPage
      in: query
      schema:
        type: integer
    providerParam:
      name: provider
      description: Only useful if the format is beacon (default is gnd).
      in: query
      schema:
        type: string
        enum: [gnd,sikart]
    sortAscParam:
      name: sortAsc
      in: query
      schema:
        type: integer
        enum: [0,1]
    sortFieldParam:
      name: sortField
      in: query
      schema:
        type: string
        enum: [id,identifier,name,title,date_start,date_end]
    searchParam:
      name: search
      in: query
      schema:
        type: string
  schemas:
    EffectiveProfile:
      type: object
      description: Flattened AI-cataloging profile (mirrors the package DTO).
      properties:
        slug:
          type: string
          example: foto-grunderschliessung
        version:
          type: integer
          example: 3
        providers:
          type: array
          items:
            type: string
          example: [infomaniak, anthropic]
        model:
          type: string
          example: google/gemma-4-31B-it
        promptTemplate:
          type: string
        fields:
          type: object
          additionalProperties:
            type: object
            properties:
              required:
                type: boolean
              aiCanSuggest:
                type: boolean
              hints:
                type: object
                nullable: true
        contextConfig:
          type: object
        languageHint:
          type: string
          nullable: true
          example: de
        videoStrategy:
          type: string
          enum: [direct, frames]
        videoCapSeconds:
          type: integer
        frameIntervalSeconds:
          type: integer
        sceneDetectionEnabled:
          type: boolean
        auditEnabled:
          type: boolean
        auditThreshold:
          type: integer
    UsageReport:
      type: object
      required: [provider, model, tokens_in, tokens_out, cost_chf, success]
      properties:
        provider:
          type: string
          example: infomaniak
        model:
          type: string
          example: google/gemma-4-31B-it
        tokens_in:
          type: integer
          minimum: 0
        tokens_out:
          type: integer
          minimum: 0
        cost_chf:
          type: number
          description: provider-billed cost (Anton applies the tenant margin)
          example: 0.0009
        success:
          type: boolean
        latency_ms:
          type: integer
          nullable: true
          example: 2870
        profile_slug:
          type: string
          nullable: true
        entry_uuid:
          type: string
          nullable: true
          maxLength: 36
        source:
          type: string
          maxLength: 32
          default: agate
    BudgetStatus:
      type: object
      properties:
        spent_chf:
          type: number
          example: 12.45
        limit_chf:
          type: number
          example: 20.00
        status:
          type: string
          enum: [ok, soft_warn, hard_block]
  securitySchemes:
    # This section configures basic authentication with an API key.
    ApiKeyAuth:
      type: apiKey
      in: query
      name: api_token
    # Bearer token (users.api_token) — preferred for AI-cataloging endpoints.
    BearerAuth:
      type: http
      scheme: bearer
