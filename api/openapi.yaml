components:
  parameters:
    formatParam:
      name: format
      in: query
      schema:
        type: string
        enum: [select2,json]
      description:
           default is `json`
    objectFormatParam:
      name: format
      in: query
      required: false
      schema:
        type: string
        enum:
          - json
          - tei
          - cidoc-crm
          - cidoc
          - rdf
          - ric
          - rico
          - memobase
          - select2
          - flat
      description: >
        Output format for `/objects/{id}`.
        Default `json` (Eloquent API Resource).
        `tei` returns a TEI Header XML.
        `cidoc-crm` / `cidoc` / `rdf` (aliases) return the A+ RDF profile (CIDOC CRM lead + RiC-O 1.1 selective).
        `ric` / `rico` (aliases) return pure RiC-O 1.1.
        `memobase` returns the Memobase JSON-LD profile.
        `select2` / `flat` are AJAX-helper shapes used internally.
    serializationParam:
      name: serialization
      in: query
      required: false
      schema:
        type: string
        enum:
          - turtle
          - jsonld
          - rdfxml
          - ntriples
      description: >
        Wire-format for the RDF profiles. Default per profile:
        A+ (`cidoc-crm`) defaults to `turtle`; RiC-O (`ric`) and Memobase default to `jsonld`.
        Memobase accepts only `jsonld` and `turtle`; A+ and RiC-O accept all four.
        Ignored for non-RDF formats (`json`, `tei`).
    idParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
    localeParam:
      name: locale
      in: path
      required: true
      schema:
        type: string
        enum: [de, en, fr]
    pageParam:
      name: page
      in: query
      schema:
        type: integer
    perPageParam:
      name: perPage
      in: query
      schema:
        type: integer
    providerParam:
      name: provider
      description: Only useful if the format is beacon (default is gnd).
      in: query
      schema:
        type: string
        enum: [gnd,sikart]
    sortAscParam:
      name: sortAsc
      in: query
      schema:
        type: integer
        enum: [0,1]
    sortFieldParam:
      name: sortField
      in: query
      schema:
        type: string
        enum: [id,identifier,name,title,date_start,date_end]
    searchParam:
      name: search
      in: query
      schema:
        type: string
  schemas:
    ActorInput:
      type: object
      description: >
        Payload for creating/updating an actor. `label` is the translatable
        display name keyed by locale. `note_<locale>_<id>` keys carry note
        objects (`{ "text": "..." }`); on update an empty text deletes the note.
      required: [label]
      properties:
        private:
          type: boolean
          nullable: true
        type_id:
          type: integer
          description: Authority type — a term id (see /authority-types)
        name:
          type: string
          maxLength: 255
        label:
          type: object
          additionalProperties:
            type: string
            nullable: true
          example: { de: "Müller, Hans", fr: "Müller, Hans" }
        alternative_names:
          type: array
          items:
            type: string
          nullable: true
        variants:
          type: array
          items:
            type: string
          nullable: true
        abbreviations:
          type: array
          items:
            type: string
          nullable: true
        anton_date_start:
          type: string
          nullable: true
        anton_date_end:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
    PlaceInput:
      type: object
      description: >
        Payload for creating/updating a place. Either `name` or `label`
        (translatable, keyed by locale) is required. `location` is
        `"<lat> <lon>"` (decimal) or Swiss coordinates.
      properties:
        type_id:
          type: integer
          nullable: true
          description: Place type — a term id (see /place-types)
        name:
          type: string
          maxLength: 255
        label:
          type: object
          additionalProperties:
            type: string
            nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        country_code_id:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
          example: "47.3769 8.5417"
        alternative_names:
          type: array
          items:
            type: string
          nullable: true
        variants:
          type: array
          items:
            type: string
          nullable: true
        abbreviations:
          type: array
          items:
            type: string
          nullable: true
        comment:
          type: string
          nullable: true
    EffectiveProfile:
      type: object
      description: Flattened AI-cataloging profile (mirrors the package DTO).
      properties:
        slug:
          type: string
          example: foto-grunderschliessung
        version:
          type: integer
          example: 3
        providers:
          type: array
          items:
            type: string
          example: [infomaniak, anthropic]
        model:
          type: string
          example: google/gemma-4-31B-it
        promptTemplate:
          type: string
        fields:
          type: object
          additionalProperties:
            type: object
            properties:
              required:
                type: boolean
              aiCanSuggest:
                type: boolean
              hints:
                type: object
                nullable: true
        contextConfig:
          type: object
        languageHint:
          type: string
          nullable: true
          example: de
        videoStrategy:
          type: string
          enum: [direct, frames]
        videoCapSeconds:
          type: integer
        frameIntervalSeconds:
          type: integer
        sceneDetectionEnabled:
          type: boolean
        auditEnabled:
          type: boolean
        auditThreshold:
          type: integer
    UsageReport:
      type: object
      required: [provider, model, tokens_in, tokens_out, cost_chf, success]
      properties:
        provider:
          type: string
          example: infomaniak
        model:
          type: string
          example: google/gemma-4-31B-it
        tokens_in:
          type: integer
          minimum: 0
        tokens_out:
          type: integer
          minimum: 0
        cost_chf:
          type: number
          description: provider-billed cost (Anton applies the tenant margin)
          example: 0.0009
        success:
          type: boolean
        latency_ms:
          type: integer
          nullable: true
          example: 2870
        profile_slug:
          type: string
          nullable: true
        entry_uuid:
          type: string
          nullable: true
          maxLength: 36
        source:
          type: string
          maxLength: 32
          default: agate
    BudgetStatus:
      type: object
      properties:
        spent_chf:
          type: number
          example: 12.45
        limit_chf:
          type: number
          example: 20.00
        status:
          type: string
          enum: [ok, soft_warn, hard_block]
  securitySchemes:
    # This section configures basic authentication with an API key.
    ApiKeyAuth:
      type: apiKey
      in: query
      name: api_token
    # Bearer token (users.api_token) — preferred for AI-cataloging endpoints.
    BearerAuth:
      type: http
      scheme: bearer
